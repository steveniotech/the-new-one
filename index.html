<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Cookie Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🍪 Cookie Clicker 🍪</h1>
        
        <div class="score-board">
            <div id="xp-display">XP: 0</div>
            <div id="cookie-type">Current: Plain Cookie</div>
        </div>

        <div class="cookie-container" id="cookie-area">
            <div id="main-cookie" class="cookie-graphic">🍪</div>
        </div>

        <div class="shop-container">
            <h2>Factory Upgrades</h2>
            <button id="buy-autoclicker" class="shop-btn">
                🤖 Buy Auto-Clicker (Cost: 200 XP)
            </button>
            <div id="autoclicker-count">Auto-Clickers Owned: 0</div>
        </div>
        
        <button id="reset-btn" class="danger-btn">Reset Progress</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
